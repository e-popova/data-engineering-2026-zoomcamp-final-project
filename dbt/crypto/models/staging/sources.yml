sources:
  - name: crypto_raw
    description: Raw data
    database: de-zoomcamp2026-final
    schema: crypto_raw
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    tables:
      - name: klines
        description: Klines/candlesticks data
        loaded_at_field: close_time
        columns:
          - name: symbol
            data_type: string
          - name: open_time
            data_type: timestamp
            description: "Kline start time"
          - name: close_time
            data_type: timestamp
            description: "Kline close time"
          - name: open
            data_type: float64
            description: "Kline Open price"
          - name: high
            data_type: float64
            description: "Kline High price"
          - name: low
            data_type: float64
            description: "Kline Low price"
          - name: close
            data_type: float64
            description: "Kline Close price"
          - name: volume
            data_type: float64
            description: "Base asset volume"
          - name: trades
            data_type: int64
            description: "Number of trades"
          - name: ingested_at
            data_type: timestamp
            description: "Time when WebSocket message is received."